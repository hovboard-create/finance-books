name: Automated Content Pipeline

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  discover-and-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Discover new books
        run: npm run discover-books
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}

      - name: Enrich book metadata
        run: npm run enrich-books
        env:
          GOODREADS_API_KEY: ${{ secrets.GOODREADS_API_KEY }}

      - name: Generate editorial content
        run: npm run generate-editorial
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run ETL
        run: npm run etl

      - name: Commit and push changes
        run: npm run commit-and-deploy
        env:
          GIT_USER_NAME: 'Finance Books Bot'
          GIT_USER_EMAIL: 'bot@finance-books.com'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Content pipeline completed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Finance Books Content Pipeline*\n✅ Successfully discovered, enriched, and published new books!"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Content pipeline failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Finance Books Content Pipeline*\n❌ Pipeline failed. Check logs at:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
